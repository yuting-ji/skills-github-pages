<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水質採樣計錄表</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'LiHei Pro', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #0056b3;
            font-size: 22px;
            margin-bottom: 20px;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 15px;
            color: #444;
        }
        input[type="text"], input[type="date"], input[type="time"], input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccd0d5;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #fafbfc;
        }
        input:focus, select:focus {
            border-color: #0056b3;
            outline: none;
            background-color: #fff;
        }
        .hidden {
            display: none;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #0056b3;
            margin-top: 25px;
            margin-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 8px;
        }
        .dynamic-row {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .dynamic-row .col {
            flex: 1 1 45%;
            min-width: 120px;
        }
        .dynamic-row .col-full {
            flex: 1 1 100%;
        }
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: background-color 0.2s;
        }
        .btn-add {
            background-color: #e6f4ea;
            color: #1e8e3e;
            border: 2px dashed #1e8e3e;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .btn-add:active {
            background-color: #ceead6;
        }
        .btn-remove {
            background-color: #dc3545;
            color: white;
            width: 100%;
            margin-top: 5px;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .btn-word {
            background-color: #1a73e8;
            color: white;
            flex: 1;
            padding: 15px 0;
        }
        .btn-print {
            background-color: #6c757d;
            color: white;
            flex: 1;
            padding: 15px 0;
        }

        /* 列印/輸出 PDF 時的專屬樣式設定 */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }
            .container {
                box-shadow: none;
                border: none;
                padding: 0;
                max-width: 100%;
            }
            /* 隱藏不需印出的按鈕 */
            .btn-add, .btn-remove, .action-buttons {
                display: none !important;
            }
            .dynamic-row {
                border: 1px solid #ccc;
                page-break-inside: avoid;
            }
            input, select {
                border: none;
                background-color: transparent;
                padding: 0;
                border-bottom: 1px solid #333;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    <h2>水質採樣計錄</h2>
    
    <form id="samplingForm">
        <div class="form-group">
            <label>採樣單位:</label>
            <input type="text" id="sampling_unit" name="sampling_unit" placeholder="請輸入採樣單位">
        </div>
        <div class="form-group">
            <label>送樣人員:</label>
            <input type="text" id="deliverer" name="deliverer" placeholder="請輸入送樣人員姓名">
        </div>
        <div class="form-group">
            <label>採樣地點:</label>
            <input type="text" id="location" name="location" placeholder="例如: D01放流口">
        </div>
        
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>採樣日期:</label>
                <input type="date" id="sample_date" name="sample_date">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>採樣時間:</label>
                <input type="time" id="sample_time" name="sample_time">
            </div>
        </div>

        <div class="form-group">
            <label>樣品外觀:</label>
            <select id="appearanceSelect" onchange="toggleOtherAppearance()">
                <option value="" disabled selected>請選擇樣品外觀</option>
                <option value="透明">透明</option>
                <option value="微濁">微濁</option>
                <option value="混濁">混濁</option>
                <option value="其他">其他</option>
            </select>
            <input type="text" id="appearanceOther" class="hidden" placeholder="請說明其他外觀" style="margin-top: 10px;">
        </div>

        <div class="section-title">分析項目清單</div>
        
        <div id="analysisContainer">
            <div class="dynamic-row analysis-item">
                <div class="col-full">
                    <label>分析項目:</label>
                    <input type="text" class="item-name" placeholder="例如: COD, SS, 氨氮">
                </div>
                <div class="col">
                    <label>體積(ml):</label>
                    <input type="number" class="item-vol" placeholder="ml">
                </div>
                <div class="col">
                    <label>數量:</label>
                    <input type="number" class="item-qty" placeholder="瓶/個">
                </div>
                <div class="col-full">
                    <label>保存方式:</label>
                    <select class="item-preserve">
                        <option value="R">R</option>
                        <option value="R-SA">R-SA</option>
                        <option value="R-NA">R-NA</option>
                        <option value="R-CA">R-CA</option>
                        <option value="R-SH">R-SH</option>
                        <option value="R-AS">R-AS</option>
                        <option value="R-SF">R-SF</option>
                    </select>
                </div>
            </div>
        </div>
        <button type="button" class="btn btn-add" onclick="addAnalysisRow()">+ 繼續新增分析項目</button>

        <div class="section-title">現場量測記錄</div>
        
        <div id="measurementContainer">
            <div class="dynamic-row measure-item">
                <div class="col">
                    <label>pH:</label>
                    <input type="number" step="0.01" class="measure-val" placeholder="數值" data-name="pH">
                </div>
                <div class="col">
                    <label>水溫 (℃):</label>
                    <input type="number" step="0.1" class="measure-val" placeholder="數值" data-name="水溫(℃)">
                </div>
                <div class="col-full">
                    <label>導電度 (µmho/cm):</label>
                    <input type="number" step="1" class="measure-val" placeholder="數值" data-name="導電度(µmho/cm)">
                </div>
            </div>
        </div>
        <button type="button" class="btn btn-add" onclick="addMeasurementRow()">+ 增加其他現場量測</button>

        <div class="action-buttons">
            <button type="button" class="btn btn-word" onclick="downloadWord()">下載 Word 文件</button>
            <button type="button" class="btn btn-print" onclick="window.print()">預覽 / 列印 PDF</button>
        </div>
    </form>
</div>

<script>
    function toggleOtherAppearance() {
        const select = document.getElementById("appearanceSelect");
        const otherInput = document.getElementById("appearanceOther");
        if (select.value === "其他") {
            otherInput.classList.remove("hidden");
        } else {
            otherInput.classList.add("hidden");
            otherInput.value = ""; 
        }
    }

    function addAnalysisRow() {
        const container = document.getElementById("analysisContainer");
        const row = document.createElement("div");
        row.className = "dynamic-row analysis-item";
        row.innerHTML = `
            <div class="col-full">
                <label>分析項目:</label>
                <input type="text" class="item-name" placeholder="例如: COD, SS, 氨氮">
            </div>
            <div class="col">
                <label>體積(ml):</label>
                <input type="number" class="item-vol" placeholder="ml">
            </div>
            <div class="col">
                <label>數量:</label>
                <input type="number" class="item-qty" placeholder="瓶/個">
            </div>
            <div class="col-full">
                <label>保存方式:</label>
                <select class="item-preserve">
                    <option value="R">R</option>
                    <option value="R-SA">R-SA</option>
                    <option value="R-NA">R-NA</option>
                    <option value="R-CA">R-CA</option>
                    <option value="R-SH">R-SH</option>
                    <option value="R-AS">R-AS</option>
                    <option value="R-SF">R-SF</option>
                </select>
            </div>
            <button type="button" class="btn btn-remove" onclick="this.parentElement.remove()">- 刪除此項目</button>
        `;
        container.appendChild(row);
    }

    function addMeasurementRow() {
        const container = document.getElementById("measurementContainer");
        const row = document.createElement("div");
        row.className = "dynamic-row measure-item";
        row.innerHTML = `
            <div class="col">
                <label>量測項目名稱 (其他):</label>
                <input type="text" class="measure-custom-name" placeholder="例如: 溶氧(DO)">
            </div>
            <div class="col">
                <label>數值:</label>
                <input type="text" class="measure-custom-val" placeholder="數值與單位">
            </div>
            <button type="button" class="btn btn-remove" onclick="this.parentElement.remove()">- 刪除此量測</button>
        `;
        container.appendChild(row);
    }

    // 匯出 Word 邏輯
    function downloadWord() {
        const unit = document.getElementById('sampling_unit').value || '';
        const deliverer = document.getElementById('deliverer').value || '';
        const location = document.getElementById('location').value || '';
        const date = document.getElementById('sample_date').value || '';
        const time = document.getElementById('sample_time').value || '';
        
        let appearance = document.getElementById('appearanceSelect').value || '';
        if (appearance === '其他') {
            appearance += ' (' + document.getElementById('appearanceOther').value + ')';
        }

        // 收集分析項目
        let analysisHTML = '';
        document.querySelectorAll('.analysis-item').forEach(item => {
            const name = item.querySelector('.item-name').value || '';
            const vol = item.querySelector('.item-vol').value || '';
            const qty = item.querySelector('.item-qty').value || '';
            const preserve = item.querySelector('.item-preserve').value || '';
            if (name) {
                analysisHTML += `<tr><td>${name}</td><td>${vol}</td><td>${qty}</td><td>${preserve}</td></tr>`;
            }
        });

        // 收集量測記錄
        let measureHTML = '';
        document.querySelectorAll('.measure-val').forEach(item => {
            measureHTML += `<li>${item.getAttribute('data-name')}: ${item.value}</li>`;
        });
        document.querySelectorAll('.measure-custom-name').forEach((item, index) => {
            const valInput = document.querySelectorAll('.measure-custom-val')[index];
            if (item.value) {
                measureHTML += `<li>${item.value}: ${valInput.value}</li>`;
            }
        });

        // 組裝 Word HTML 結構
        const wordContent = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head>
                <meta charset='utf-8'>
                <title>水質採樣計錄</title>
                <style>
                    body { font-family: '標楷體', '微軟正黑體', sans-serif; }
                    table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
                    th, td { border: 1px solid black; padding: 8px; text-align: left; }
                    h2 { text-align: center; }
                </style>
            </head>
            <body>
                <h2>水質採樣計錄</h2>
                <table>
                    <tr><th width="20%">採樣單位</th><td width="30%">${unit}</td><th width="20%">送樣人員</th><td width="30%">${deliverer}</td></tr>
                    <tr><th>採樣地點</th><td colspan="3">${location}</td></tr>
                    <tr><th>採樣日期</th><td>${date}</td><th>採樣時間</th><td>${time}</td></tr>
                    <tr><th>樣品外觀</th><td colspan="3">${appearance}</td></tr>
                </table>

                <h3>分析項目</h3>
                <table>
                    <tr><th>分析項目</th><th>體積(ml)</th><th>數量</th><th>保存方式</th></tr>
                    ${analysisHTML}
                </table>

                <h3>現場量測記錄</h3>
                <ul>
                    ${measureHTML}
                </ul>
            </body>
            </html>
        `;

        const blob = new Blob(['\ufeff', wordContent], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `採樣計錄_${date ? date : '未命名'}.doc`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    window.onload = function() {
        const now = new Date();
        const dateString = now.toISOString().split('T')[0];
        const timeString = now.toTimeString().split(' ')[0].substring(0,5);
        document.getElementById('sample_date').value = dateString;
        document.getElementById('sample_time').value = timeString;
    };
</script>

</body>
</html>
